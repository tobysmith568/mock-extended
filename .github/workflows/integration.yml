name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        description: Version to build
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
        type: string

defaults:
  run:
    shell: pwsh

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run typecheck tests
        run: bun run typecheck:test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Version mock-extended package
        if: ${{ github.event.inputs.version }}
        working-directory: packages/mock-extended
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Pack mock-extended package
        working-directory: packages/mock-extended
        run: bun run pack

      - name: Upload mock-extended artifact
        uses: actions/upload-artifact@v6
        with:
          name: mock-extended-build
          path: packages/mock-extended/*.tgz
          retention-days: 1
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  codeql:
    name: CodeQL
    uses: ./.github/workflows/codeql.yml
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    secrets: inherit
