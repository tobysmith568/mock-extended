name: Continuous Integration

on:
  push:
    branches:
      - renovate/*
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        description: Version to build
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run typecheck tests
        run: bun run typecheck:test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Version mock-extended package
        if: ${{ inputs.version }}
        working-directory: packages/mock-extended
        run: bun pm version ${{ inputs.version }} --no-git-tag-version

      - name: Pack mock-extended package
        working-directory: packages/mock-extended
        run: bun run pack

      - name: Upload mock-extended artifact
        uses: actions/upload-artifact@v7
        with:
          name: mock-extended-build
          path: packages/mock-extended/*.tgz
          retention-days: 1
          if-no-files-found: error

      - name: Upload docs website artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-website-build
          path: apps/docs/dist
          retention-days: 1
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/docs
        run: bunx playwright install --with-deps chromium

      - name: Run tests
        run: bun run test
